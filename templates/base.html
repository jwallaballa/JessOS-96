<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jess | Retro Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'win98-teal': '#008080',
                        'win98-gray': '#c0c0c0',
                        'win98-blue': '#000080',
                    },
                    boxShadow: {
                        'win-out': 'inset 1px 1px 0px #fff, inset -1px -1px 0px #808080, 1px 1px 0px #000',
                        'win-in': 'inset 1px 1px 0px #808080, inset -1px -1px 0px #fff, 1px 1px 0px #fff',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-win98-teal overflow-hidden">


    {% block content %}
    {% endblock %}

</body>
</html>
